name: Self-Healing CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout code
        uses: actions/checkout@v4

      - name: Step 2 - Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Step 3 - Install dependencies
        run: pip install flask pytest requests

      - name: Step 4 - Run tests
        run: python -m pytest tests/ -v

      - name: Step 5 - Build Docker image
        run: docker build -t my-app .

      - name: Step 6 - Confirm image built
        run: docker images my-app

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Step 7 - Checkout code
        uses: actions/checkout@v4

      - name: Step 8 - Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            echo "📥 Pulling latest code from GitHub..."
            if [ -d "self-healing-pipeline" ]; then
              cd self-healing-pipeline
              git pull origin main
            else
              git clone https://github.com/Druvv4u/self-healing-pipeline.git
              cd self-healing-pipeline
            fi

            echo "🐳 Building new Docker image..."
            docker build -t my-app .

            echo "🔁 Restarting container with new image..."
            docker stop my-app || true
            docker rm my-app || true
            docker run -d --name my-app -p 5000:5000 \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              my-app

            echo "✅ Checking health..."
            sleep 10
            curl -f http://localhost:5000/health && echo "🎉 Deployment successful!" || echo "❌ Health check failed!"
            